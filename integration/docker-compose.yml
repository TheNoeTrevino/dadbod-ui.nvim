# Real database servers for the export integration suite (host runner model:
# these containers are the servers; nvim + the client CLIs run on the host and
# connect over the mapped 127.0.0.1 ports). Image tags are PINNED so the golden
# files stay stable -- bump a tag and re-record goldens deliberately.
#
# Ports are deliberately non-default (5xxxx) so the suite never collides with a
# database a developer already runs locally.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dbui
      POSTGRES_PASSWORD: dbui
      POSTGRES_DB: dbui
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbui -d dbui"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dbui
      MYSQL_PASSWORD: dbui
      MYSQL_DATABASE: dbui
    ports:
      - "127.0.0.1:53306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 2s
      timeout: 3s
      retries: 30

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: dbui
      MARIADB_PASSWORD: dbui
      MARIADB_DATABASE: dbui
    ports:
      - "127.0.0.1:53307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 30

  # The test runner itself: Neovim + every client CLI (see Dockerfile). Started
  # on demand by run.sh via `docker compose run`, never by `up` -- hence the
  # profile. This is what makes docker the ONLY thing a contributor installs.
  runner:
    profiles: [runner]
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /work
    volumes:
      - ..:/work
      # Test deps (lazy.nvim, mini.test, vim-dadbod) live here, NOT in the
      # mounted repo -- see LAZY_STDPATH in the Dockerfile. A named volume
      # keeps local re-runs fast; CI starts with an empty one, so a missing
      # dependency fails there instead of hiding behind the host's copy.
      - test-deps:/deps
    environment:
      # Servers are reachable by service name on the compose network.
      DBUI_IT_PG_HOST: postgres
      DBUI_IT_PG_PORT: "5432"
      DBUI_IT_MYSQL_HOST: mysql
      DBUI_IT_MYSQL_PORT: "3306"
      DBUI_IT_MARIADB_HOST: mariadb
      DBUI_IT_MARIADB_PORT: "3306"
      DBUI_IT_CH_HOST: clickhouse
      DBUI_IT_CH_PORT: "9000"
      DBUI_IT_MONGO_HOST: mongodb
      DBUI_IT_MONGO_PORT: "27017"
      DBUI_IT_MSSQL_HOST: sqlserver
      DBUI_IT_MSSQL_PORT: "1433"
      DBUI_IT_MODE: "${DBUI_IT_MODE:-check}"
      DBUI_IT_EXTRA: "${DBUI_IT_EXTRA:-0}"
      # Keep every cache/state write inside the mounted repo or /tmp, so
      # nothing lands in a root-owned dir on the host.
      HOME: /tmp

  # ---- opt-in extras (profile `extra`, DBUI_IT_EXTRA=1) ----------------------
  # Heavier or less-common servers. Seeding runs INSIDE these containers (their
  # images ship the client), but the specs still need the matching host CLI --
  # run.sh only exports a DBUI_IT_*_URL when that client is on the PATH.

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    profiles: [extra]
    environment:
      CLICKHOUSE_USER: dbui
      CLICKHOUSE_PASSWORD: dbui
      CLICKHOUSE_DB: dbui
    ports:
      - "127.0.0.1:59000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user dbui --password dbui --query 'SELECT 1'"]
      interval: 2s
      timeout: 3s
      retries: 30

  mongodb:
    image: mongo:7
    profiles: [extra]
    ports:
      - "127.0.0.1:57017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping: 1}).ok'"]
      interval: 2s
      timeout: 3s
      retries: 30

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: [extra]
    environment:
      ACCEPT_EULA: "Y"
      # Complexity rules want 3 character classes; keep it url-safe (no
      # specials) so the connection url needs no percent-encoding.
      MSSQL_SA_PASSWORD: "DbuiPass1"
    ports:
      - "127.0.0.1:51433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P DbuiPass1 -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P DbuiPass1 -Q 'SELECT 1'"]
      interval: 3s
      timeout: 5s
      retries: 40

volumes:
  test-deps:
