name: integration

# Real-database integration suite. This job installs NOTHING: the database
# servers and the test runner (Neovim + every client CLI) are all containers
# defined in integration/docker-compose.yml -- the single definition of the
# stack -- so CI runs the byte-identical command a contributor runs locally.
#
# See integration/README.md.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'lua/dadbod-ui/**'
      - 'integration/**'
      - 'tests/minit.lua'
      - 'Makefile'
      - '.github/workflows/integration.yml'
  workflow_dispatch:
    inputs:
      extra:
        description: 'Also run the extra adapters (clickhouse, mongodb, sqlserver)'
        type: boolean
        default: false

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # To pull the prebuilt runner image published by integration-runner.yml.
      packages: read

    steps:
      # Pinned by commit: a version tag is a mutable pointer -- what runs here
      # should change only when we change it.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Nothing after checkout talks to the repo, so don't leave the token
          # embedded in .git/config for the rest of the job.
          persist-credentials: false

      # Lets run.sh pull the prebuilt runner image instead of building it. Not
      # required: a fork PR gets a token that cannot read the package, and
      # run.sh just builds locally instead -- so this must never fail the job.
      - name: Log in to GHCR
        continue-on-error: true
        # Via env rather than ${{ }} interpolation: the latter pastes the token
        # into the shell command itself, where it reaches argv.
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Run integration suite
        env:
          DBUI_IT_EXTRA: ${{ inputs.extra && '1' || '0' }}
        run: make test-integration
